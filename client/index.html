<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/images/products/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pepta is a premium B2B wholesale marketplace for high-quality dolls, plush toys, and educational accessories. Streamlined for global retailers with tiered pricing, bulk management, and institutional-grade inventory solutions." />
    <meta name="theme-color" content="#533638" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifests/manifest.json" />
    <link rel="apple-touch-icon" href="/images/products/logo.jpeg" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <title>Pepta | Professional B2B Wholesale Marketplace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/manifests/sw.js')
            .catch(err => console.log('SW registration failed: ', err))
        })
      }
    </script>
  </body>
</html>
