<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="google-site-verification" content="buPPBVzEjZ5bJPE46UrVOm71DM99zvg78Zy2zBCqCq4" />
  <link rel="icon" type="image/jpeg" href="/images/products/logo.jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Prevent browser history from serving a stale app shell -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description"
    content="Premium Toy wholesale supplier across world. Direct factory prices, bulk discounts, and professional wholesale service." />
  <meta name="theme-color" content="#533638" />

  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="google119d68bf1282344e" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifests/manifest.json" />
  <link rel="apple-touch-icon" href="/images/products/logo.jpeg" />

  <!-- Slow-network resource hints: establish connections early so the first
       API call and the first Cloudinary image don't pay a full TCP + TLS
       handshake penalty (saves ~200-500 ms on 2G/3G). -->
  <link rel="preconnect"  href="https://pepta-api.vercel.app" />
  <link rel="preconnect"  href="https://res.cloudinary.com" />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

  <title>Pepta | Professional B2B Wholesale Marketplace</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/manifests/sw.js')
          .catch(err => console.log('SW registration failed: ', err))
      })
    }
  </script>
</body>

</html>
